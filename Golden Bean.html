<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Bean | Professional CRM & POS</title>
    <style>
        :root {
            --primary: #D4AF37; --bg: #0a0a0a; --card-bg: #161616;
            --text: #ffffff; --accent: #00d26a; --danger: #ff4757;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100vh; overflow: hidden; }

        /* --- Admin Button Top Right --- */
        .admin-access { position: fixed; top: 15px; right: 20px; z-index: 7000; }
        .btn-admin-top {
            background: #222; border: 1px solid #333; color: #555;
            padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 12px;
            transition: 0.3s;
        }
        .btn-admin-top:hover { color: var(--primary); border-color: var(--primary); }

        /* --- Full Screen Service Selection --- */
        #serviceOverlay { 
            position: fixed; inset: 0; background: var(--bg); z-index: 6000; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
        }
        .service-box { display: flex; gap: 30px; margin-top: 30px; }
        .service-card { 
            background: var(--card-bg); border: 1px solid #333; 
            padding: 60px 40px; border-radius: 30px; text-align: center; 
            cursor: pointer; transition: 0.3s; width: 260px; 
        }
        .service-card:hover { border-color: var(--primary); transform: translateY(-10px); background: #1a1a1a; }
        .service-icon { font-size: 80px; display: block; margin-bottom: 20px; filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.2)); }
        .service-card h2 { margin: 0; font-size: 24px; color: var(--text); letter-spacing: 1px; }

        /* --- Main POS Layout --- */
        .main-container { display: none; height: 100vh; width: 100%; }
        .menu-section { flex: 1; padding: 30px; overflow-y: auto; padding-top: 70px; }
        .billing-section { width: 420px; background: #111; border-left: 1px solid #222; padding: 25px; display: flex; flex-direction: column; padding-top: 70px; }

        /* --- Search Bar Styling --- */
        .search-container { position: relative; width: 250px; }
        .search-bar { 
            background: #1a1a1a; border: 1px solid #333; color: white; padding: 10px 15px; 
            border-radius: 12px; width: 100%; font-size: 14px; outline: none; transition: 0.3s;
        }
        .search-bar:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(212, 175, 55, 0.1); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; }
        .item-card { background: var(--card-bg); border-radius: 20px; padding: 15px; text-align: center; cursor: pointer; border: 1px solid #2d2d2d; position: relative; }
        .item-card img { width: 100%; height: 110px; object-fit: cover; border-radius: 12px; margin-bottom: 10px; }
        
        #cartContainer { flex: 1; overflow-y: auto; margin: 20px 0; }
        .cart-item { background: #1a1a1a; padding: 12px; border-radius: 12px; margin-bottom: 10px; border-left: 4px solid var(--primary); display: flex; justify-content: space-between; }

        input, select { background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; border-radius: 10px; width: 100%; margin-bottom: 12px; font-size: 14px; }
        
        /* --- Admin Panel Styling --- */
        #adminPanel { position: fixed; inset: 0; background: #070707; display: none; z-index: 8000; padding: 40px; overflow-y: auto; }
        .admin-layout { display: flex; gap: 40px; }
        .admin-form { width: 320px; background: #161616; padding: 25px; border-radius: 20px; border: 1px solid #222; height: fit-content; }
        .report-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #161616; padding: 20px; border-radius: 15px; border: 1px solid #222; text-align: center; }
        .stat-card h2 { color: var(--primary); margin: 10px 0 0 0; }

        table { width: 100%; border-collapse: collapse; background: #111; border-radius: 15px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #222; vertical-align: top; }
        th { background: #1a1a1a; color: var(--primary); font-size: 12px; text-transform: uppercase; }

        /* --- Modals & Buttons --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 9000; }
        .qty-box { background: #1d1d1d; padding: 30px; border-radius: 30px; width: 340px; border: 1px solid #333; }
        .num-display { background: #000; font-size: 40px; padding: 20px; text-align: right; border-radius: 15px; color: var(--primary); margin-bottom: 20px; font-weight: bold; border: 1px solid #222; }
        .num-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .btn-num { background: #2a2a2a; color: white; border: none; padding: 20px; font-size: 22px; border-radius: 15px; cursor: pointer; }
        .btn-order { background: var(--accent); color: white; border: none; padding: 18px; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; }
        .delete-btn { position: absolute; top: -5px; right: -5px; background: var(--danger); color: white; border: none; border-radius: 50%; width: 25px; height: 25px; cursor: pointer; display: none; z-index: 10; }
        .item-card:hover .delete-btn { display: block; }
    </style>
</head>
<body>

<div class="admin-access">
    <button class="btn-admin-top" onclick="openAdmin()">⚙️ SYSTEM ADMIN</button>
</div>

<div id="serviceOverlay">
    <h1 style="color: var(--primary); font-size: 48px; margin-bottom: 10px; letter-spacing: 3px;">GOLDEN BEAN</h1>
    <p style="color: #666; margin-bottom: 40px; font-size: 18px;">Select Service to Begin</p>
    <div class="service-box">
        <div class="service-card" onclick="selectService('Dine In')">
            <span class="service-icon">🍽️</span>
            <h2>DINE IN</h2>
        </div>
        <div class="service-card" onclick="selectService('Takeaway')">
            <span class="service-icon">🛍️</span>
            <h2>TAKEAWAY</h2>
        </div>
    </div>
</div>

<div class="main-container" id="posLayout">
    <div class="menu-section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <div>
                <h1 style="margin:0; font-size: 28px; display: inline-block;">Menu</h1>
                <span id="modeTag" style="color: var(--primary); font-size: 14px; margin-left: 10px; background: #222; padding: 5px 12px; border-radius: 20px; vertical-align: middle;"></span>
            </div>
            
            <!-- --- Added Search Bar --- -->
            <div class="search-container">
                <input type="text" id="menuSearch" class="search-bar" placeholder="🔍 Search product..." onkeyup="filterMenu()">
            </div>

            <button onclick="resetToHome()" style="background: none; border: 1px solid #444; color: #888; padding: 8px 15px; border-radius: 8px; cursor: pointer;">← Change Mode</button>
        </div>
        <div class="grid" id="menuGrid"></div>
    </div>

    <div class="billing-section">
        <h3 style="margin-top: 0; color: #888;">Order Summary</h3>
        <input type="text" id="custName" placeholder="Customer Name (Optional)">
        <input type="text" id="custPhone" placeholder="Phone Number">
        <div id="cartContainer"></div>
        <div style="background: #000; padding: 20px; border-radius: 20px; border: 1px solid #222;">
            <select id="payMethod" onchange="toggleCardInput(this.value)">
                <option value="Cash">💵 Cash Payment</option>
                <option value="Card">💳 Card Payment</option>
                <option value="Online">📱 Online Transfer</option>
            </select>
            <input type="text" id="cardInp" placeholder="Last 4 Digits / Ref No" style="display:none">
            <div style="display:flex; justify-content:space-between; font-size:26px; margin: 15px 0 20px 0; font-weight: bold;">
                <span>Total</span>
                <span style="color:var(--primary);">Rs. <span id="totalDisplay">0</span></span>
            </div>
            <button class="btn-order" onclick="processOrder()">Place Order</button>
        </div>
    </div>
</div>

<div id="qtyModal" class="modal">
    <div class="qty-box">
        <div id="itemNameDisplay" style="text-align:center; color:#888; margin-bottom:10px; text-transform: uppercase; letter-spacing: 1px;">Item</div>
        <div class="num-display" id="numVal">0</div>
        <div class="num-grid">
            <button class="btn-num" onclick="pressNum(1)">1</button>
            <button class="btn-num" onclick="pressNum(2)">2</button>
            <button class="btn-num" onclick="pressNum(3)">3</button>
            <button class="btn-num" onclick="pressNum(4)">4</button>
            <button class="btn-num" onclick="pressNum(5)">5</button>
            <button class="btn-num" onclick="pressNum(6)">6</button>
            <button class="btn-num" onclick="pressNum(7)">7</button>
            <button class="btn-num" onclick="pressNum(8)">8</button>
            <button class="btn-num" onclick="pressNum(9)">9</button>
            <button class="btn-num" onclick="pressNum('C')" style="color:var(--danger)">C</button>
            <button class="btn-num" onclick="pressNum(0)">0</button>
            <button class="btn-num" onclick="confirmQty()" style="background:var(--accent); color:white;">OK</button>
        </div>
    </div>
</div>

<div id="adminPanel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <h1 style="color:var(--primary); margin:0; letter-spacing: 2px;">MANAGER DASHBOARD</h1>
        <button onclick="closeModal('adminPanel')" style="background:#222; color:white; border:1px solid #444; padding:10px 25px; border-radius:10px; cursor:pointer;">Close Dashboard</button>
    </div>
    
    <div class="report-grid">
        <div class="stat-card"><span>Total Sales</span><h2 id="statTotal">0</h2></div>
        <div class="stat-card"><span>Cash Sales</span><h2 id="statCash">0</h2></div>
        <div class="stat-card"><span>Digital</span><h2 id="statDigital">0</h2></div>
        <div class="stat-card"><span>Total Orders</span><h2 id="statCust">0</h2></div>
    </div>

    <div class="admin-layout">
        <div class="admin-form">
            <h3 style="margin-top:0; color:var(--primary)">Product Management</h3>
            <input type="text" id="newProdName" placeholder="Product Name">
            <input type="number" id="newProdPrice" placeholder="Price (PKR)">
            <input type="text" id="newProdImg" placeholder="Image Link (URL)">
            <button class="btn-order" onclick="addNewItem()" style="background:var(--primary); color:black">Add to Menu</button>
            <div style="margin-top:30px; border-top: 1px solid #333; padding-top:20px;">
                <button onclick="resetHistory()" style="width:100%; padding:12px; background:var(--danger); border:none; color:white; border-radius:10px; cursor:pointer; font-weight:bold;">🗑️ Clear Sales History</button>
            </div>
        </div>
        <div style="flex: 1;">
            <h3 style="margin-top:0">Order History Logs</h3>
            <table>
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Order ID</th>
                        <th>Service</th>
                        <th>Customer</th>
                        <th>Items</th>
                        <th>Qty</th>
                        <th>Price</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody id="orderHistoryList"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let currentService = "";
    let menu = JSON.parse(localStorage.getItem('cafeMenu')) || [
    // --- DRINKS / COFFEE ---
    {name: "Cappuccino", price: 580, img: "https://images.unsplash.com/photo-1572442388796-11668a67e53d?w=300"},
    {name: "Spanish Latte", price: 720, img: "https://images.unsplash.com/photo-1517701604599-bb29b565090c?w=300"},
    {name: "Iced Americano", price: 480, img: "https://images.unsplash.com/photo-1581996323441-538096e854b9?q=80&w=436&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"},
    {name: "Mint Margarita", price: 420, img: "https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?w=300"},
    {name: "Oreo Shake", price: 650, img: "https://images.unsplash.com/photo-1572490122747-3968b75cc699?w=300"},

    // --- SNACKS / FOOD ---
    {name: "Fudge Brownie", price: 350, img: "https://images.unsplash.com/photo-1564355808539-22fda35bed7e?w=300"},
    {name: "Classic Croissant", price: 450, img: "https://images.unsplash.com/photo-1555507036-ab1f4038808a?w=300"},
    {name: "Nutella Cookie", price: 280, img: "https://images.unsplash.com/photo-1499636136210-6f4ee915583e?w=300"},
    {name: "Club Sandwich", price: 950, img: "https://images.unsplash.com/photo-1528735602780-2552fd46c7af?w=300"}
];
        
      let cart = [], activeItem = null, numInput = "0";

    function selectService(type) {
        currentService = type;
        document.getElementById('serviceOverlay').style.display = 'none';
        document.getElementById('posLayout').style.display = 'flex';
        document.getElementById('modeTag').innerText = type;
        renderMenu(); // Load items when starting
    }

    function resetToHome() {
        document.getElementById('serviceOverlay').style.display = 'flex';
        document.getElementById('posLayout').style.display = 'none';
        document.getElementById('menuSearch').value = ""; // Clear search
    }

    function toggleCardInput(val) {
        const inp = document.getElementById('cardInp');
        inp.style.display = (val === 'Card' || val === 'Online') ? 'block' : 'none';
        if (val === 'Cash') inp.value = "";
    }

    // --- Optimized Render with Filter Capability ---
    function renderMenu(filterText = "") {
        const grid = document.getElementById('menuGrid');
        const filtered = menu.filter(item => 
            item.name.toLowerCase().includes(filterText.toLowerCase())
        );

        grid.innerHTML = filtered.map((item) => {
            // Find real index in original menu for delete/qty
            const originalIdx = menu.indexOf(item);
            return `
                <div class="item-card">
                    <button class="delete-btn" onclick="deleteItem(${originalIdx})">×</button>
                    <div onclick="openQty(${originalIdx})">
                        <img src="${item.img || 'https://via.placeholder.com/150'}">
                        <h4 style="margin:5px 0">${item.name}</h4>
                        <div style="color:var(--primary); font-weight:bold;">Rs. ${item.price}</div>
                    </div>
                </div>
            `;
        }).join('');
        
        if(filtered.length === 0) {
            grid.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding:50px; color:#555;">No items found matching "${filterText}"</div>`;
        }
    }

    // --- Live Filter Function ---
    function filterMenu() {
        const val = document.getElementById('menuSearch').value;
        renderMenu(val);
    }

    function openQty(idx) {
        activeItem = menu[idx]; numInput = "0";
        document.getElementById('numVal').innerText = "0";
        document.getElementById('itemNameDisplay').innerText = activeItem.name;
        document.getElementById('qtyModal').style.display = 'flex';
    }

    function pressNum(n) {
        if(n === 'C') numInput = "0";
        else numInput = numInput === "0" ? n.toString() : numInput + n.toString();
        document.getElementById('numVal').innerText = numInput;
    }

    function confirmQty() {
        let q = parseInt(numInput);
        if(q > 0) {
            cart.push({...activeItem, qty: q, subtotal: activeItem.price * q});
            updateCart(); closeModal('qtyModal');
        }
    }

    function updateCart() {
        let total = 0;
        document.getElementById('cartContainer').innerHTML = cart.map((item) => {
            total += item.subtotal;
            return `<div class="cart-item"><div><b>${item.name}</b> (x${item.qty})</div><b>Rs. ${item.subtotal}</b></div>`;
        }).join('');
        document.getElementById('totalDisplay').innerText = total;
    }

    function processOrder() {
        if(cart.length === 0) return alert("Cart is empty!");
        
        const payMethod = document.getElementById('payMethod').value;
        const cardVal = document.getElementById('cardInp').value;

        if((payMethod === 'Card' || payMethod === 'Online') && cardVal.trim() === "") {
            alert("⚠️ Please enter last 4 digits or Reference Number!");
            document.getElementById('cardInp').focus();
            return;
        }
        
        const order = {
            id: "GB" + Math.floor(100 + Math.random() * 899),
            type: currentService,
            name: document.getElementById('custName').value || "Walking Guest",
            method: payMethod,
            total: parseInt(document.getElementById('totalDisplay').innerText),
            itemList: cart.map(i => i.name).join('<br>'),
            qtyList: cart.map(i => 'x' + i.qty).join('<br>'),
            priceList: cart.map(i => 'Rs.' + i.price).join('<br>'),
            time: new Date().toLocaleTimeString()
        };

        let orders = JSON.parse(localStorage.getItem('cafeOrders')) || [];
        orders.unshift(order);
        localStorage.setItem('cafeOrders', JSON.stringify(orders));
        
        alert("✅ Order Completed!");
        
        cart = []; 
        updateCart();
        document.getElementById('custName').value = "";
        document.getElementById('custPhone').value = "";
        document.getElementById('cardInp').value = "";
        document.getElementById('cardInp').style.display = "none";
        document.getElementById('payMethod').value = "Cash";
        resetToHome();
    }

    function loadHistory() {
        let orders = JSON.parse(localStorage.getItem('cafeOrders')) || [];
        let total = 0, cash = 0, digital = 0;
        
        document.getElementById('orderHistoryList').innerHTML = orders.map(o => {
            total += o.total;
            if(o.method === 'Cash') cash += o.total; else digital += o.total;
            return `
                <tr>
                    <td>${o.time}</td>
                    <td>#${o.id}</td>
                    <td style="color:var(--primary)">${o.type}</td>
                    <td>${o.name}</td>
                    <td style="font-size: 12px; color: #bbb;">${o.itemList}</td>
                    <td style="color:var(--accent)">${o.qtyList}</td>
                    <td style="color:#888; font-size: 12px;">${o.priceList}</td>
                    <td><b>Rs. ${o.total}</b></td>
                </tr>`;
        }).join('');

        document.getElementById('statTotal').innerText = "Rs. " + total;
        document.getElementById('statCash').innerText = "Rs. " + cash;
        document.getElementById('statDigital').innerText = "Rs. " + digital;
        document.getElementById('statCust').innerText = orders.length;
    }

    function openAdmin() {
        if(prompt("Enter Admin PIN:") === "1234") { 
            document.getElementById('adminPanel').style.display = 'block'; 
            loadHistory(); 
        }
    }

    function addNewItem() {
        let name = document.getElementById('newProdName').value;
        let price = document.getElementById('newProdPrice').value;
        let img = document.getElementById('newProdImg').value;
        if(name && price) {
            menu.push({name, price: parseInt(price), img: img || "https://via.placeholder.com/150"});
            localStorage.setItem('cafeMenu', JSON.stringify(menu));
            renderMenu();
            document.getElementById('newProdName').value = ""; 
            document.getElementById('newProdPrice').value = "";
            document.getElementById('newProdImg').value = "";
        }
    }

    function deleteItem(idx) {
        if(confirm("Delete item?")) { 
            menu.splice(idx,1); 
            localStorage.setItem('cafeMenu', JSON.stringify(menu)); 
            renderMenu(document.getElementById('menuSearch').value); 
        }
    }

    function resetHistory() {
        if(confirm("Clear all sales?")) { localStorage.removeItem('cafeOrders'); loadHistory(); }
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    
    // Initial Render
    renderMenu();
</script>
</body>
</html>
